<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />

    <title>Capture Translator</title>

    <style>
      body {
        width: 320px;
        padding: 12px;
        font-family: Arial, sans-serif;
        background: #111827;
        color: white;
        box-sizing: border-box;
      }

      h2 {
        margin: 0 0 12px;
        font-size: 20px;
      }

      .section {
        background: #1f2937;
        padding: 12px;
        border-radius: 10px;
        margin-bottom: 12px;
      }

      .label {
        font-size: 12px;
        color: #9ca3af;
        margin-bottom: 6px;
      }

      select,
      button,
      input[type='number'] {
        width: 100%;
        padding: 8px;
        border-radius: 8px;
        border: none;
        margin-top: 8px;
        box-sizing: border-box;
      }

      select,
      input[type='number'] {
        background: #374151;
        color: white;
      }

      button {
        background: #2563eb;
        color: white;
        cursor: pointer;
      }

      button:hover {
        background: #1d4ed8;
      }

      .danger {
        background: #dc2626;
      }

      .danger:hover {
        background: #b91c1c;
      }

      .hidden {
        display: none !important;
      }

      .checkbox {
        display: flex;
        align-items: center;
        gap: 6px;
        margin: 0;
        white-space: nowrap;
      }

      .hotkey {
        margin-top: 10px;
        padding: 10px;
        border-radius: 8px;
        background: #111827;
        text-align: center;
        font-size: 14px;
        color: #10b981;
      }

      .mode-settings {
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px solid #374151;
      }

      .capture-options {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 10px;
      }

      .button-actions {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .action-row {
        display: flex;
        gap: 8px;
      }

      .action-row button {
        flex: 1;
      }

      .toast {
        position: fixed;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        background: #10b981;
        color: white;
        padding: 12px 16px;
        border-radius: 8px;
        font-size: 14px;
        z-index: 9999;
        animation: slideDown 0.3s ease-out;
      }

      .toast.error {
        background: #dc2626;
      }

      @keyframes slideDown {
        from {
          opacity: 0;
          transform: translateX(-50%) translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateX(-50%) translateY(0);
        }
      }
    </style>
  </head>

  <body>
    <div id="toast" class="hidden"></div>

    <h2>Capture Translator</h2>

    <!-- GLOBAL SETTINGS -->
    <div class="section">
      <div style="display: flex; gap: 10px">
        <!-- SOURCE -->
        <div style="flex: 1">
          <div class="label">SOURCE</div>

          <select id="sourceLang">
            <option value="English">English</option>

            <option value="Chinese">Chinese</option>

            <option value="Japanese">Japanese</option>

            <option value="Korean">Korean</option>
          </select>
        </div>

        <!-- TARGET -->
        <div style="flex: 1">
          <div class="label">TARGET</div>

          <select id="targetLang">
            <option value="Vietnamese">Vietnamese</option>
          </select>
        </div>
      </div>

      <button id="submitSettingBtn">Save Settings</button>
    </div>

    <!-- MODE -->
    <div class="section">
      <div class="label">MODE</div>

      <select id="mode">
        <option value="manga_manual">Manga Manual</option>

        <option value="manga_auto">Manga Auto</option>

        <option value="screenshot">Screenshot Once</option>

        <option value="stream">Screen Stream</option>
      </select>
    </div>

    <!-- MODE SETTINGS -->
    <div class="section">
      <div class="label">MODE SETTINGS</div>

      <!-- Manga Auto -->
      <div id="mangaAutoSettings" class="mode-settings">
        <button class="setRegionBtn">Set Region</button>

        <div class="capture-options">
          <label class="checkbox">
            <input type="radio" name="mangaAutoCaptureMode" checked />

            Screen Changes
          </label>

          <label class="checkbox">
            <input type="radio" name="mangaAutoCaptureMode" />

            Interval(s)
          </label>

          <input
            type="number"
            min="0.4"
            max="4.0"
            step="0.2"
            value="1.0"
            placeholder="Seconds"
            style="width: 50px; margin: 0"
          />
        </div>
      </div>

      <!-- Manga Manual -->
      <div id="mangaManualSettings" class="mode-settings hidden">
        <button class="setRegionBtn">Set Region</button>

        <div class="hotkey">Translate Hotkey: ALT + Q</div>
      </div>

      <!-- Screenshot -->
      <div id="screenshotSettings" class="mode-settings hidden">
        <div class="hotkey">Translate Hotkey: ALT + Q</div>
      </div>

      <!-- Stream -->
      <div id="streamSettings" class="mode-settings hidden">
        <button id="selectScreenBtn">🖥 Open Stream</button>
      </div>
    </div>

    <!-- ACTIONS -->

    <!-- Manga Auto -->
    <div id="mangaAutoActions" class="button-actions">
      <div class="action-row">
        <button class="startBtn">▶ Start</button>

        <button class="stopBtn danger">■ Stop</button>
      </div>

      <button class="viewResultsBtn">👁 View Results</button>
    </div>

    <!-- Manga Manual -->
    <div id="mangaManualActions" class="button-actions hidden">
      <button class="viewResultsBtn">👁 View Results</button>
    </div>

    <!-- Screenshot -->
    <div id="screenshotActions" class="button-actions hidden">
      <button class="viewResultsBtn">👁 View Results</button>
    </div>

    <!-- Stream (hidden in popup - all controls are in stream.html) -->
    <div id="streamActions" class="button-actions hidden"></div>

    <script src="popup.js"></script>
  </body>
</html>
