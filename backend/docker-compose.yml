services:
  llama-server:
    # check images at https://github.com/ggml-org/llama.cpp/blob/master/docs/docker.md
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: llama-server
    ports:
      - "8121:8080"
    volumes:
      - ./translator/models:/models
    gpus: all
    command: >
      --model /models/translategemma-4b-it-q8_0.gguf  --host 0.0.0.0  --port 8080  --n-gpu-layers 99  --ctx-size 1024

  translator-backend:
    container_name: translator-backend
    build: .
    volumes:
      - .:/app
      # - ./.venv:/app/.venv
    ports:
      - "7860:7860"
      - "8052:8052"
    gpus: all
    environment:
      - PYTHONUNBUFFERED=1
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860
      - UV_LINK_MODE=copy
    shm_size: '4gb'
    stdin_open: true
    tty: true
    command: [ "/bin/bash" ]

  turbo-ocr-english:
    image: ghcr.io/aiptimizer/turboocr:v2.3.0
    container_name: turbo-ocr-english

    runtime: nvidia
    gpus: all

    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility

    ports:
      - "9080:8000"
      - "9081:50051"

    restart: unless-stopped
    volumes:
      - ./turboocr-cache:/home/ocr/.cache/turbo-ocr

  turbo-ocr-chinese:
    image: ghcr.io/aiptimizer/turboocr:v2.3.0
    container_name: turbo-ocr-chinese

    runtime: nvidia
    gpus: all

    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - OCR_LANG=chinese
      - OCR_SERVER=1
      - TRT_OPT_LEVEL=3
      - TRT_ENGINE_CACHE=/home/ocr/.cache/turbo-ocr
      - DISABLE_LAYOUT=1

    ports:
      - "9180:8000"
      - "9181:50051"

    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ready"]
      interval: 30s
      timeout: 5s
      start_period: 2h